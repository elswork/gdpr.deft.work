server {
    listen 80;
    server_name localhost;

    # Serve static admin files
    location / {
        root /usr/share/nginx/html;
        index admin.html index.htm;
        try_files $uri $uri/ /admin.html =404;
    }

    # Proxy ALL API requests to backend container (since admin needs full access)
    location /api/ {
        proxy_pass http://gdpr_backend:3000/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }
}
