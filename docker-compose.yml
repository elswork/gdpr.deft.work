version: '3.8'

services:
  gdpr_backend:
    build: ./backend
    container_name: gdpr_backend
    restart: unless-stopped
    volumes:
      - ./backend/uploads:/app/uploads

  gdpr_frontend:
    image: nginx:alpine
    container_name: gdpr_frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    volumes:
      - ./frontend:/usr/share/nginx/html:ro
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - gdpr_backend
