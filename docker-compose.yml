version: '3.8'

services:
  gdpr_backend:
    build: ./backend
    container_name: gdpr_backend
    restart: unless-stopped
    volumes:
      - ./backend/uploads:/app/uploads

  gdpr_frontend:
    image: nginx:alpine
    container_name: gdpr_frontend
    restart: unless-stopped
    ports:
      - "3001:80"
    volumes:
      - ./frontend:/usr/share/nginx/html:ro
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - gdpr_backend

  gdpr_admin_frontend:
    image: nginx:alpine
    container_name: gdpr_admin_frontend
    profiles: ["admin"]
    ports:
      - "3002:443"
    volumes:
      - ./admin-frontend:/usr/share/nginx/html:ro
      - ./nginx-admin.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx-selfsigned.crt:/etc/nginx/ssl/nginx-selfsigned.crt:ro
      - ./nginx-selfsigned.key:/etc/nginx/ssl/nginx-selfsigned.key:ro
    depends_on:
      - gdpr_backend
