server {
    listen 80;
    server_name localhost;

    # Serve static frontend files
    location / {
        root /usr/share/nginx/html;
        index index.html index.htm;
        try_files $uri $uri/ =404;
    }

    # Only allow uploads to the API from the public internet
    location = /api/upload {
        proxy_pass http://gdpr_backend:3000/api/upload;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        client_max_body_size 20M;
    }

    # Block any other API access (like listing or deleting files)
    location /api/ {
        return 403;
    }
}
