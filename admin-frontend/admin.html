<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel - GDPR</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        .details-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            font-size: 13px;
            text-align: left;
            margin-bottom: 20px;
        }
        .details-grid strong {
            color: var(--text-muted);
            display: block;
            margin-bottom: 3px;
        }
        .doc-btn {
            background: #06b6d4;
            margin-bottom: 10px;
        }
        .doc-btn:hover {
            background: #0891b2;
        }
    </style>
</head>
<body>
    <div class="background">
        <div class="shape"></div>
        <div class="shape"></div>
    </div>
    <div class="container" style="max-width: 600px;">
        <h1>Received Registrations</h1>
        <p class="subtitle">Download and locally decrypt received data.</p>
        
        <div id="fileList" class="file-list">
            <p style="text-align: center; color: var(--text-muted);">Loading records...</p>
        </div>

        <div class="admin-link">
            <a href="index.html">Back to Submission Form</a>
            <span style="color: var(--text-muted); margin: 0 10px;">|</span>
            <a href="/api/logout" style="color: #ef4444;">Logout</a>
        </div>
    </div>

    <!-- Password Modal -->
    <div id="passwordModal" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 10; justify-content: center; align-items: center;">
        <div class="container" style="max-width: 400px; padding: 30px;">
            <h2 style="font-size: 18px; margin-bottom: 15px;">Decrypt Record</h2>
            <p id="modalFileName" style="font-size: 13px; color: var(--text-muted); margin-bottom: 20px;"></p>
            <div class="form-group">
                <input type="password" id="decryptPassword" placeholder="Encryption password" required>
            </div>
            <button id="confirmDecryptBtn" style="margin-bottom: 10px;">Decrypt</button>
            <button id="cancelDecryptBtn" style="background: transparent; border: 1px solid var(--border);">Cancel</button>
            <p id="decryptStatus" style="text-align: center; margin-top: 10px; font-size: 13px;"></p>
        </div>
    </div>

    <!-- Details Modal -->
    <div id="detailsModal" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 20; justify-content: center; align-items: center; overflow-y: auto;">
        <div class="container" style="max-width: 600px; padding: 30px; margin: 20px 0;">
            <h2 style="font-size: 20px; margin-bottom: 20px;">Decrypted Record Details</h2>
            
            <div class="details-grid" id="detailsGrid">
                <!-- Dynamically populated -->
            </div>

            <div id="documentsContainer" style="margin-top: 20px; border-top: 1px solid var(--border); padding-top: 20px;">
                <!-- Download buttons -->
            </div>

            <button id="closeDetailsBtn" style="margin-top: 20px; background: transparent; border: 1px solid var(--border);">Close</button>
        </div>
    </div>

    <script src="admin.js"></script>
</body>
</html>
